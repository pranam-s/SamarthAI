{% extends "base.html" %}

{% block title %}{{ t('resumes.upload') }} - {{ app_name }}{% endblock %}

{% block content %}
<div class="card bg-base-100 shadow-xl">
    <div class="card-body">
        <h2 class="card-title">{{ t('resumes.upload') }}</h2>
        
        <div class="tabs tabs-boxed mb-6" role="tablist" aria-label="{{ t('resumes.upload') }}">
            <button type="button" class="tab tab-active" id="file-tab" role="tab" aria-selected="true" aria-controls="file-section" onclick="switchTab('file')">{{ t('resumes.upload_file') }}</button>
            <button type="button" class="tab" id="text-tab" role="tab" aria-selected="false" aria-controls="text-section" onclick="switchTab('text')">{{ t('resumes.paste_text') }}</button>
        </div>
        
        <form method="post" action="/resumes/create" enctype="multipart/form-data" x-data="{ fileName: '' }">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
            <div id="file-section" role="tabpanel" aria-labelledby="file-tab">
                <div class="form-control">
                    <label class="label" for="resume-file">
                        <span class="label-text">{{ t('resumes.resume_file') }}</span>
                    </label>
                    <input 
                        id="resume-file"
                        type="file" 
                        name="resume_file" 
                        class="file-input file-input-bordered w-full" 
                        accept=".pdf,.docx,.doc,.txt"
                        @change="fileName = $event.target.files[0]?.name"
                    />
                    <label class="label" x-show="fileName">
                        <span class="label-text-alt" x-text="fileName"></span>
                    </label>
                </div>
            </div>
            
            <div id="text-section" class="hidden" role="tabpanel" aria-labelledby="text-tab">
                <div class="form-control">
                    <label class="label" for="resume-text">
                        <span class="label-text">{{ t('resumes.resume_text') }}</span>
                    </label>
                    <textarea id="resume-text" name="resume_text" class="textarea textarea-bordered h-64" placeholder="Paste your resume text here..."></textarea>
                </div>
            </div>
            
            <div class="form-control mt-6">
                <button type="submit" class="btn btn-primary">{{ t('resumes.process_resume') }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function switchTab(tab) {
        if (tab === 'file') {
            document.getElementById('file-tab').classList.add('tab-active');
            document.getElementById('text-tab').classList.remove('tab-active');
            document.getElementById('file-tab').setAttribute('aria-selected', 'true');
            document.getElementById('text-tab').setAttribute('aria-selected', 'false');
            document.getElementById('file-section').classList.remove('hidden');
            document.getElementById('text-section').classList.add('hidden');
        } else {
            document.getElementById('file-tab').classList.remove('tab-active');
            document.getElementById('text-tab').classList.add('tab-active');
            document.getElementById('file-tab').setAttribute('aria-selected', 'false');
            document.getElementById('text-tab').setAttribute('aria-selected', 'true');
            document.getElementById('file-section').classList.add('hidden');
            document.getElementById('text-section').classList.remove('hidden');
        }
    }
</script>
{% endblock %}
