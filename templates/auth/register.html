{% extends "base.html" %}

{% block title %}{{ t('auth.register.title') }} - {{ app_name }}{% endblock %}

{% block content %}
<div class="flex justify-center">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl justify-center mb-6">{{ t('auth.register.title') }}</h2>
            
            <form method="post" action="/register">
                <div class="form-control">
                    <label class="label" for="email">
                        <span class="label-text">{{ t('auth.email') }}</span>
                    </label>
                    <input id="email" type="email" name="email" placeholder="{{ t('auth.placeholder.email') }}" class="input input-bordered" required />
                </div>
                
                <div class="form-control mt-4">
                    <label class="label" for="full_name">
                        <span class="label-text">{{ t('auth.full_name') }}</span>
                    </label>
                    <input id="full_name" type="text" name="full_name" placeholder="{{ t('auth.placeholder.full_name') }}" class="input input-bordered" required />
                </div>
                
                <div class="form-control mt-4">
                    <label class="label" for="password">
                        <span class="label-text">{{ t('auth.password') }}</span>
                    </label>
                    <input id="password" type="password" name="password" placeholder="{{ t('auth.placeholder.password') }}" class="input input-bordered" required />
                </div>
                
                <div class="form-control mt-4">
                    <label class="label cursor-pointer justify-start" for="is_recruiter">
                        <input id="is_recruiter" type="checkbox" name="is_recruiter" class="checkbox checkbox-primary mr-2" />
                        <span class="label-text">{{ t('auth.recruiter') }}</span>
                    </label>
                </div>
                
                <div class="form-control mt-6">
                    <button type="submit" class="btn btn-primary">{{ t('nav.register') }}</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p>{{ t('auth.have_account') }} <a href="/login" class="link link-primary">{{ t('auth.login_here') }}</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
